name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-cache

jobs:
  # Detect whether the PR touches any code-bearing path. If not (e.g. doc-only
  # PRs that update CLAUDE.md or rename a vault path), `test` and `build` skip
  # entirely and the merge waits only on lint + secrets + the test-aggregator
  # check (which treats `skipped` as a pass for branch protection).
  #
  # `push: branches: [main]` events bypass the filter — the post-merge run is
  # the safety net against a misconfigured filter letting a real code change
  # slip through. We pay the full CI cost once per merge, never per PR.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'examples/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig*.json'
              - 'playwright.config.ts'
              - 'eslint.config.*'
              - '.prettierrc*'
              - 'prettier.config.*'
              - '.github/workflows/**'

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: bun install
      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck
      - name: Security pattern check
        run: |
          echo "Scanning src/ for dangerous patterns..."
          FOUND=0
          if grep -rnE 'eval\(|new Function\(' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found eval() or new Function()"
            FOUND=1
          fi
          if grep -rnE '\.innerHTML\s*=' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found unsanitized .innerHTML assignment"
            FOUND=1
          fi
          if grep -rnE 'exec\(.*`' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found exec() with template literal"
            FOUND=1
          fi
          if grep -rnE 'sk-[a-zA-Z0-9]{20}|sk_live_|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|npm_[a-zA-Z0-9]{36}' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found hardcoded secret pattern"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "✓ No dangerous patterns found"
      - name: Check for CLAUDE.md in repo
        run: |
          if git ls-tree -r HEAD --name-only | grep -q 'CLAUDE.md'; then
            echo "ERROR: CLAUDE.md found in repo tree. Remove it and add to .gitignore."
            exit 1
          fi
          echo "✓ CLAUDE.md not in repo"

  test:
    name: Test
    needs: [changes]
    # Skip on doc-only PRs. Always run on push-to-main as the safety net.
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: bun install
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bun pm ls 2>/dev/null | grep playwright | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-cache
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # Unit and e2e tests both shell out to `bun run src/cli.ts render`,
      # which loads the runtime bundle via output/runtime-loader.ts. Build
      # before tests so the bundle is on disk. Cache the bundle so we don't
      # rebuild it in the build job for the same source tree.
      - name: Cache dist-runtime
        id: runtime-cache
        uses: actions/cache@v4
        with:
          path: dist-runtime
          key: runtime-${{ runner.os }}-${{ hashFiles('src/runtime/**', 'scripts/build-runtime.ts', 'src/animation/scene/**') }}
      - name: Build runtime bundle
        if: steps.runtime-cache.outputs.cache-hit != 'true'
        run: bun run build:runtime
      # Unit tests are deterministic — run once on shard 1 instead of 4×.
      - name: Unit tests
        if: matrix.shard == 1
        run: bun run test
      - name: E2E
        run: bun run test:e2e -- --shard=${{ matrix.shard }}/4

  # Aggregator: branch-protection requires a check named exactly `Test`,
  # but the matrix above produces `Test (1)`–`Test (4)`. This job emits
  # the bare `Test` check name and fails iff any shard failed. Same
  # pattern PR #35 used for the v1/v2 dual-runtime matrix.
  test-aggregator:
    name: Test
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Verify all shards passed (or were skipped on a doc-only PR)
        run: |
          # `skipped` happens when the `changes` filter says no code changed.
          # Branch protection requires this `Test` check to pass; treat skipped
          # as success so doc-only PRs aren't blocked.
          if [ "${{ needs.test.result }}" != "success" ] && [ "${{ needs.test.result }}" != "skipped" ]; then
            echo "FAIL: test job result=${{ needs.test.result }}"
            exit 1
          fi
          if [ "${{ needs.test.result }}" = "skipped" ]; then
            echo "✓ Tests skipped (no code changes detected)"
          else
            echo "✓ All test shards passed"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    # GitHub's default behavior skips a job whose `needs:` is skipped, so build
    # is automatically a no-op on doc-only PRs (because `test` is skipped). No
    # explicit conditional needed — the `needs: [test]` chain handles it.
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: bun install
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bun pm ls 2>/dev/null | grep playwright | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-cache
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # CLI bundle (dist/cli.js) is unique to this job; runtime bundle is
      # restored from the test job's cache when source is unchanged. Split
      # `bun run build` into its two halves so we can skip build:runtime
      # on cache hit. See package.json for the canonical command.
      - name: Cache dist-runtime
        id: runtime-cache
        uses: actions/cache@v4
        with:
          path: dist-runtime
          key: runtime-${{ runner.os }}-${{ hashFiles('src/runtime/**', 'scripts/build-runtime.ts', 'src/animation/scene/**') }}
      - name: Build CLI bundle
        run: bun build src/cli.ts --outdir dist --target node --packages external
      - name: Build runtime bundle
        if: steps.runtime-cache.outputs.cache-hit != 'true'
        run: bun run build:runtime
      - name: Smoke test (node)
        run: |
          echo 'graph TD; A-->B; B-->C;' > /tmp/test.mmd
          node dist/cli.js render /tmp/test.mmd -o /tmp/test-node.html
          test -s /tmp/test-node.html || { echo "FAIL: output file empty or missing"; exit 1; }
          echo "✓ Node smoke test passed"
      - name: Smoke test (bun)
        run: |
          bun dist/cli.js render /tmp/test.mmd -o /tmp/test-bun.html
          test -s /tmp/test-bun.html || { echo "FAIL: output file empty or missing"; exit 1; }
          echo "✓ Bun smoke test passed"
      - name: Verify self-contained HTML
        run: |
          if grep -qE 'src="https?://' /tmp/test-node.html; then
            echo "FAIL: output contains external src references"
            exit 1
          fi
          if grep -qE '<link[^>]*href="https?://' /tmp/test-node.html; then
            echo "FAIL: output contains external stylesheet references"
            exit 1
          fi
          echo "✓ Output is self-contained"
      - name: Verify Content-Security-Policy
        run: |
          if ! grep -q "Content-Security-Policy" /tmp/test-node.html; then
            echo "FAIL: output HTML missing Content-Security-Policy meta tag"
            exit 1
          fi
          echo "✓ CSP meta tag present"
