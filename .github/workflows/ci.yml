name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-cache

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint
      - run: bun run format:check
      - name: Security pattern check
        run: |
          echo "Scanning src/ for dangerous patterns..."
          FOUND=0
          if grep -rnE 'eval\(|new Function\(' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found eval() or new Function()"
            FOUND=1
          fi
          if grep -rnE '\.innerHTML\s*=' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found unsanitized .innerHTML assignment"
            FOUND=1
          fi
          if grep -rnE 'exec\(.*`' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found exec() with template literal"
            FOUND=1
          fi
          if grep -rnE 'sk-[a-zA-Z0-9]{20}|sk_live_|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|npm_[a-zA-Z0-9]{36}' src/ --include='*.ts' | grep -v '// safe:'; then
            echo "FAIL: found hardcoded secret pattern"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "✓ No dangerous patterns found"
      - name: Check for CLAUDE.md in repo
        run: |
          if git ls-tree -r HEAD --name-only | grep -q 'CLAUDE.md'; then
            echo "ERROR: CLAUDE.md found in repo tree. Remove it and add to .gitignore."
            exit 1
          fi
          echo "✓ CLAUDE.md not in repo"

  test:
    name: Test (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        runtime: [v1, v2]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bun pm ls 2>/dev/null | grep playwright | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-cache
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # Build the runtime bundle in both cells: post-R5 the default runtime
      # is v2, and unit tests that shell out to `bun run src/cli.ts render`
      # (svg-labels-theme, integration/render, themes/theme) hit the v2 path
      # and read dist-runtime/runtime.js via output/runtime-loader.ts. The v1
      # cell needs it too because its unit-tests step doesn't set
      # HANSOOM_RUNTIME — that's the documented "no env-flag leak into unit
      # tests" rule. R6 collapses this once v1 is gone.
      - name: Build runtime bundle
        run: bun run build:runtime
      # Unit tests run only once (matrix.runtime == 'v1') — they're env-agnostic
      # and would just duplicate work in the v2 cell.
      - name: Unit tests
        if: matrix.runtime == 'v1'
        run: bun run test
      - name: E2E (${{ matrix.runtime }})
        env:
          HANSOOM_RUNTIME: ${{ matrix.runtime }}
        run: bun run test:e2e

  # Single canonical "Test" check that the main-branch ruleset requires.
  # The matrix cells emit "Test (v1)" / "Test (v2)" which the ruleset
  # doesn't know about; this aggregator gates on both cells passing.
  test-summary:
    name: Test
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Gate on matrix outcome
        run: |
          echo "matrix outcome: ${{ needs.test.result }}"
          [ "${{ needs.test.result }}" = "success" ] || { echo "FAIL: at least one matrix cell did not pass"; exit 1; }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bun pm ls 2>/dev/null | grep playwright | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-cache
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: bun run build
      - name: Smoke test (node)
        run: |
          echo 'graph TD; A-->B; B-->C;' > /tmp/test.mmd
          node dist/cli.js render /tmp/test.mmd -o /tmp/test-node.html
          test -s /tmp/test-node.html || { echo "FAIL: output file empty or missing"; exit 1; }
          echo "✓ Node smoke test passed"
      - name: Smoke test (bun)
        run: |
          bun dist/cli.js render /tmp/test.mmd -o /tmp/test-bun.html
          test -s /tmp/test-bun.html || { echo "FAIL: output file empty or missing"; exit 1; }
          echo "✓ Bun smoke test passed"
      - name: Verify self-contained HTML
        run: |
          if grep -qE 'src="https?://' /tmp/test-node.html; then
            echo "FAIL: output contains external src references"
            exit 1
          fi
          if grep -qE '<link[^>]*href="https?://' /tmp/test-node.html; then
            echo "FAIL: output contains external stylesheet references"
            exit 1
          fi
          echo "✓ Output is self-contained"
      - name: Verify Content-Security-Policy
        run: |
          if ! grep -q "Content-Security-Policy" /tmp/test-node.html; then
            echo "FAIL: output HTML missing Content-Security-Policy meta tag"
            exit 1
          fi
          echo "✓ CSP meta tag present"
